services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alex-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alex}
      POSTGRES_USER: ${POSTGRES_USER:-alex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alex_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - alex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alex} -d ${POSTGRES_DB:-alex}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alex-postgres-data:
